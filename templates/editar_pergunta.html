{% extends 'base_aluno.html' %}
{% load static %}

{% block content %}
<div class="mb-4 d-flex align-items-center gap-3">
    <a href="{% url 'gerenciar_perguntas' atividade.id %}" class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px; border: 1px solid #e2e8f0;">
        <i class="bi bi-arrow-left text-dark"></i>
    </a>
    <div>
        <span class="badge bg-warning text-dark px-2 py-1 rounded-pill mb-1" style="font-size: 0.7rem;">Modo Edição</span>
        <h3 class="fw-bold mb-0">Editar Questão {{ pergunta.ordem }}</h3>
        <span class="text-muted small">Atividade: {{ atividade.titulo }}</span>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card-custom bg-white p-4 p-md-5 border shadow-sm">
            
            <form method="POST" action="{% url 'editar_pergunta' pergunta.id %}" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="enunciado" class="form-label fw-bold text-dark">Enunciado da Questão <span class="text-danger">*</span></label>
                    <textarea class="form-control bg-light border-0" id="enunciado" name="enunciado" rows="5" required>{{ pergunta.enunciado }}</textarea>
                </div>

                <div class="row mb-5">
                    <div class="col-md-6 mb-4 mb-md-0">
                        <label for="ordem" class="form-label fw-bold text-dark">Número da Questão <span class="text-danger">*</span></label>
                        <input type="number" class="form-control bg-light border-0" id="ordem" name="ordem" value="{{ pergunta.ordem }}" min="1" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="imagem_apoio" class="form-label fw-bold text-dark">Nova Imagem de Apoio</label>
                        <input type="file" class="form-control bg-light border-0" id="imagem_apoio" name="imagem_apoio" accept="image/*">
                        {% if pergunta.imagem_apoio %}
                            <div class="form-text small text-success mt-2">
                                <i class="bi bi-image"></i> Imagem atual: <a href="{{ pergunta.imagem_apoio.url }}" target="_blank">Visualizar</a>
                            </div>
                        {% endif %}
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 pt-4 border-top">
                    <a href="{% url 'gerenciar_perguntas' atividade.id %}" class="btn btn-light px-4 fw-semibold rounded-pill border">Cancelar</a>
                    <button type="submit" class="btn text-white px-5 fw-bold rounded-pill shadow-sm" style="background-color: var(--brand-green);">
                        Atualizar Enunciado <i class="bi bi-arrow-clockwise ms-1"></i>
                    </button>
                </div>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
