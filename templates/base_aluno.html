{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno | EvoluçãoLibras</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS Externo Isolado -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>

    <!-- Fundo escuro quando o menu abrir no mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar Verde -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo d-flex justify-content-between align-items-center">
            <a href="{% url 'dashboard' %}" class="d-flex align-items-center gap-2 text-decoration-none">
                <i class="bi bi-book-half fs-4 text-white"></i>
                <span class="fs-5 fw-bold text-white">
                    Evolução<span style="color: #4ade80;">Libras</span>
                </span>
            </a>
            <!-- Botão de Fechar Menu (Só aparece no mobile) -->
            <button class="btn text-white d-md-none border-0 p-0" id="closeSidebarBtn">
                <i class="bi bi-x-lg fs-4"></i>
            </button>
        </div>

        <nav class="d-flex flex-column gap-2">
            <!-- Link Início/Trilha (Fica aceso no Dashboard e dentro de um Módulo) -->
            <a href="{% url 'dashboard' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'dashboard' or request.resolver_match.url_name == 'detalhe_modulo' %}active{% endif %}">
                <i class="bi bi-grid-1x2"></i> Início
            </a>
            
            <!-- Link Meu Perfil (Fica aceso apenas na página de perfil) -->
            <a href="{% url 'meu_perfil' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'meu_perfil' %}active{% endif %}">
                <i class="bi bi-person"></i> Meu Perfil
            </a>

                {% if request.user.is_staff %}
                    <hr class="text-white opacity-25 my-2">
                    <p class="text-white opacity-50 small fw-bold text-uppercase mb-1 px-3" style="font-size: 0.7rem;">Gestão</p>
                    
                    <!-- Link Painel Pesquisa -->
                    <a href="{% url 'painel_pesquisador' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'painel_pesquisador' %}active{% endif %}" {% if request.resolver_match.url_name == 'painel_pesquisador' %}style="border-left: 3px solid #f59e0b;"{% endif %}>
                        <i class="bi bi-bar-chart-fill" {% if request.resolver_match.url_name == 'painel_pesquisador' %}style="color: #f59e0b;"{% endif %}></i> Dashboard
                    </a>
                    
                    <!-- NOVO: Link Gestão de Módulos -->
                    <a href="{% url 'gestao_modulos' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'gestao_modulos' %}active{% endif %}" {% if request.resolver_match.url_name == 'gestao_modulos' %}style="border-left: 3px solid #f59e0b;"{% endif %}>
                        <i class="bi bi-box-seam-fill" {% if request.resolver_match.url_name == 'gestao_modulos' %}style="color: #f59e0b;"{% endif %}></i> Módulos
                    </a>
                    <!-- NOVO: Link Gestão de Videoaulas -->
                    <a href="{% url 'gestao_videoaulas' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'gestao_videoaulas' or request.resolver_match.url_name == 'criar_videoaula' or request.resolver_match.url_name == 'editar_videoaula' %}active{% endif %}" {% if 'gestao/videoaulas' in request.path %}style="border-left: 3px solid #f59e0b;"{% endif %}>
                        <i class="bi bi-play-btn-fill" {% if 'gestao/videoaulas' in request.path %}style="color: #f59e0b;"{% endif %}></i> Videoaulas
                    </a>
                    <!-- NOVO: Link Gestão de Atividades -->
                <a href="{% url 'gestao_atividades' %}" class="nav-link-custom {% if 'gestao/atividades' in request.path %}active{% endif %}" {% if 'gestao/atividades' in request.path %}style="border-left: 3px solid #f59e0b;"{% endif %}>
                    <i class="bi bi-clipboard-check-fill" {% if 'gestao/atividades' in request.path %}style="color: #f59e0b;"{% endif %}></i> Atividades
                </a>

                    <a href="/admin/" target="_blank" class="nav-link-custom text-white opacity-75 mt-2">
                        <i class="bi bi-database-fill-gear"></i> Django Admin <i class="bi bi-box-arrow-up-right ms-auto small"></i>
                    </a>
                {% endif %}
        </nav>

        <div class="sidebar-footer">
            <hr style="border-color: rgba(255,255,255,0.2);">
            <a href="{% url 'sair' %}" class="nav-link-custom logout p-2">
                <i class="bi bi-box-arrow-left"></i> Sair
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Topbar Branca -->
        <header class="topbar">
            <!-- Botão de Menu Hambúrguer (Só aparece no mobile) -->
            <button class="btn text-dark d-md-none border-0 p-0 me-3" id="openSidebarBtn">
                <i class="bi bi-list fs-1"></i>
            </button>

            <!-- ms-auto empurra o perfil para a direita -->
            <div class="user-profile ms-auto">
                <i class="bi bi-bell fs-5 text-muted me-3 cursor-pointer"></i>
                <div class="avatar">{{ user.nome|make_list|first|upper }}</div>
                <span class="fw-semibold text-dark">{{ user.nome }}</span>
            </div>
        </header>

        <main class="content-area">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Lógica do Menu Mobile -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const openBtn = document.getElementById('openSidebarBtn');
            const closeBtn = document.getElementById('closeSidebarBtn');

            function toggleMenu() {
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
            }

            openBtn.addEventListener('click', toggleMenu);
            closeBtn.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        });
    </script>
</body>
</html>
