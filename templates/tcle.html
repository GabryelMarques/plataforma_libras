{% extends 'base_aluno.html' %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0 p-5">
        <h2 class="fw-bold mb-4">Termo de Consentimento (TCLE)</h2>
        <div class="border p-4 bg-light mb-4" style="max-height: 300px; overflow-y: auto;">
            <p>Aqui você deve colar o texto completo do seu Termo de Consentimento aprovado pelo Comitê de Ética...</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="aceite" required>
                <label class="form-check-label" for="aceite">Li, entendi e aceito os termos da pesquisa.</label>
            </div>
            <button type="submit" class="btn btn-brand w-100">Confirmar Participação</button>
        </form>
    </div>
</div>
{% endblock %}
