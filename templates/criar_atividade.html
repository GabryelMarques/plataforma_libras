{% extends 'base_aluno.html' %}
{% load static %}

{% block content %}
<div class="mb-4 d-flex align-items-center gap-3">
    <a href="{% url 'gestao_atividades' %}" class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px; border: 1px solid #e2e8f0;">
        <i class="bi bi-arrow-left text-dark"></i>
    </a>
    <div>
        <h3 class="fw-bold mb-0">Nova Atividade</h3>
        <span class="text-muted small">Crie um Pré-teste, Pós-teste ou Exercício para a pesquisa.</span>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card-custom bg-white p-4 p-md-5 border shadow-sm">
            
            <form method="POST" action="{% url 'criar_atividade' %}">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="titulo" class="form-label fw-bold text-dark">Título da Avaliação <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg bg-light border-0" id="titulo" name="titulo" placeholder="Ex: Pré-teste: Introdução à Genética" required>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-4 mb-md-0">
                        <label for="modulo" class="form-label fw-bold text-dark">Vincular ao Módulo <span class="text-danger">*</span></label>
                        <select class="form-select bg-light border-0" id="modulo" name="modulo" required>
                            <option value="" selected disabled>Selecione um módulo...</option>
                            {% for modulo in modulos %}
                                <option value="{{ modulo.id }}">{{ modulo.titulo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="tipo" class="form-label fw-bold text-dark">Tipo de Avaliação <span class="text-danger">*</span></label>
                        <select class="form-select bg-light border-0" id="tipo" name="tipo" required>
                            <option value="" selected disabled>Selecione o tipo...</option>
                            {% for valor, nome in tipos_atividade %}
                                <option value="{{ valor }}">{{ nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="descricao" class="form-label fw-bold text-dark">Descrição / Instruções <span class="text-danger">*</span></label>
                    <textarea class="form-control bg-light border-0" id="descricao" name="descricao" rows="4" placeholder="Instruções para o aluno realizar esta avaliação..." required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
                    <a href="{% url 'gestao_atividades' %}" class="btn btn-light px-4 fw-semibold rounded-pill border">Cancelar</a>
                    <button type="submit" class="btn text-white px-5 fw-bold rounded-pill shadow-sm" style="background-color: var(--brand-green);">
                        Salvar Atividade <i class="bi bi-check-lg ms-1"></i>
                    </button>
                </div>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
