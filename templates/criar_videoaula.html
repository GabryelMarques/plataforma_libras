{% extends 'base_aluno.html' %}
{% load static %}

{% block content %}
<div class="mb-4 d-flex align-items-center gap-3">
    <a href="{% url 'gestao_videoaulas' %}" class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px; border: 1px solid #e2e8f0;">
        <i class="bi bi-arrow-left text-dark"></i>
    </a>
    <div>
        <h3 class="fw-bold mb-0">Nova Videoaula</h3>
        <span class="text-muted small">Preencha os dados e faça o upload do vídeo em Libras.</span>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card-custom bg-white p-4 p-md-5 border shadow-sm">
            
            <form method="POST" action="{% url 'criar_videoaula' %}" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="row mb-4">
                    <div class="col-md-7 mb-4 mb-md-0">
                        <label for="titulo" class="form-label fw-bold text-dark">Título da Aula <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-light border-0" id="titulo" name="titulo" placeholder="Ex: Sinais de Cumprimento" required>
                    </div>
                    <div class="col-md-5">
                        <label for="modulo" class="form-label fw-bold text-dark">Vincular ao Módulo <span class="text-danger">*</span></label>
                        <select class="form-select bg-light border-0" id="modulo" name="modulo" required>
                            <option value="" selected disabled>Selecione um módulo...</option>
                            {% for modulo in modulos %}
                                <option value="{{ modulo.id }}">{{ modulo.titulo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="descricao" class="form-label fw-bold text-dark">Descrição da Aula <span class="text-danger">*</span></label>
                    <textarea class="form-control bg-light border-0" id="descricao" name="descricao" rows="4" placeholder="O que será abordado neste vídeo?" required></textarea>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-4 mb-md-0">
                        <label for="ordem" class="form-label fw-bold text-dark">Ordem de Exibição <span class="text-danger">*</span></label>
                        <input type="number" class="form-control bg-light border-0" id="ordem" name="ordem" value="1" min="1" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="duracao" class="form-label fw-bold text-dark">Duração (HH:MM:SS) <span class="text-danger">*</span></label>
                        <!-- O type="time" com step="1" força o formato de horas, minutos e segundos -->
                        <input type="time" step="1" class="form-control bg-light border-0" id="duracao" name="duracao" required>
                    </div>
                </div>

                <div class="row mb-5">
                    <div class="col-md-6 mb-4 mb-md-0">
                        <label for="miniatura" class="form-label fw-bold text-dark">Miniatura (Thumbnail) <span class="text-danger">*</span></label>
                        <input type="file" class="form-control bg-light border-0" id="miniatura" name="miniatura" accept="image/*" required>
                        <div class="form-text small">A capa que o aluno verá. Proporção sugerida: 16:9.</div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="arquivo_video" class="form-label fw-bold text-dark">Arquivo de Vídeo <span class="text-danger">*</span></label>
                        <input type="file" class="form-control bg-light border-0" id="arquivo_video" name="arquivo_video" accept="video/*" required>
                        <div class="form-text small">Formatos aceitos: MP4, WebM.</div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
                    <a href="{% url 'gestao_videoaulas' %}" class="btn btn-light px-4 fw-semibold rounded-pill border">Cancelar</a>
                    <button type="submit" class="btn text-white px-5 fw-bold rounded-pill shadow-sm" style="background-color: var(--brand-green);">
                        Salvar Aula <i class="bi bi-check-lg ms-1"></i>
                    </button>
                </div>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
