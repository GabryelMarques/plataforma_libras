{% extends 'base_aluno.html' %}
{% load static %}

{% block content %}
<div class="mb-4 d-flex align-items-center gap-3">
    <a href="{% url 'gestao_modulos' %}" class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px; border: 1px solid #e2e8f0;">
        <i class="bi bi-arrow-left text-dark"></i>
    </a>
    <div>
        <span class="badge bg-warning text-dark px-2 py-1 rounded-pill mb-1" style="font-size: 0.7rem;">Modo Edição</span>
        <h3 class="fw-bold mb-0">Editar: {{ modulo.titulo }}</h3>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card-custom bg-white p-4 p-md-5 border shadow-sm">
            
            <form method="POST" action="{% url 'editar_modulo' modulo.id %}" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="titulo" class="form-label fw-bold text-dark">Título do Módulo <span class="text-danger">*</span></label>
                    <!-- value preenchido com o dado do banco -->
                    <input type="text" class="form-control form-control-lg bg-light border-0" id="titulo" name="titulo" value="{{ modulo.titulo }}" required>
                </div>

                <div class="mb-4">
                    <label for="descricao" class="form-label fw-bold text-dark">Descrição <span class="text-danger">*</span></label>
                    <!-- texto dentro da tag para textarea -->
                    <textarea class="form-control bg-light border-0" id="descricao" name="descricao" rows="4" required>{{ modulo.descricao }}</textarea>
                </div>

                <div class="row mb-5">
                    <div class="col-md-6 mb-4 mb-md-0">
                        <label for="ordem" class="form-label fw-bold text-dark">Ordem de Exibição <span class="text-danger">*</span></label>
                        <input type="number" class="form-control bg-light border-0" id="ordem" name="ordem" value="{{ modulo.ordem }}" min="1" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="imagem_capa" class="form-label fw-bold text-dark">Nova Imagem de Capa</label>
                        <input type="file" class="form-control bg-light border-0" id="imagem_capa" name="imagem_capa" accept="image/*">
                        {% if modulo.imagem_capa %}
                            <div class="form-text small text-success mt-2">
                                <i class="bi bi-image"></i> Já possui imagem: <a href="{{ modulo.imagem_capa.url }}" target="_blank">Ver atual</a>
                            </div>
                        {% endif %}
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
                    <a href="{% url 'gestao_modulos' %}" class="btn btn-light px-4 fw-semibold rounded-pill border">Cancelar</a>
                    <button type="submit" class="btn text-white px-5 fw-bold rounded-pill shadow-sm" style="background-color: var(--brand-green);">
                        Atualizar Módulo <i class="bi bi-arrow-clockwise ms-1"></i>
                    </button>
                </div>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
